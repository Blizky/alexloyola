<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex Loyola</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f7;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
      animation: fadeIn 0.6s ease;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 12px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.2rem;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.4;
    }

    .button {
      display: inline-block;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #0099cc;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
      margin-bottom: 22px;
      box-shadow: 0 4px 12px rgba(0, 153, 204, 0.3);
    }

    .button:hover {
      background: #007fa8;
      box-shadow: 0 6px 16px rgba(0, 153, 204, 0.4);
    }

    .button:active {
      transform: scale(0.98);
    }

    .email {
      display: block;
      font-size: 1rem;
      color: #2563eb;
      text-decoration: none;
      margin-top: 10px;
    }

    .email:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 2.4rem;
      }

      .subtitle {
        font-size: 1.05rem;
      }

      .container {
        padding: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Alex Loyola</h1>

    <div class="subtitle">
      Operations & Logistics | Team Leadership | Bilingual (EN/ES)
    </div>

    <a class="button" href="/resume">View Resume</a>

    <a class="email" href="mailto:alex.loyola.work@gmail.com">
      alex.loyola.work@gmail.com
    </a>
  </div>
</body>
</html>
